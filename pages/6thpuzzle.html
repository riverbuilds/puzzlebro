<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>puzzle</title>
</head>
<body>
 <p>this one wONT be easier...?</p>
    <p>coordinates of church on my graph+ map? ex:(50, 100)</p>
     <img src="./images.html/sixth.png">

<input id="pw" type="password" placeholder="test it">
    <button id="go">enter</button>
    <div id="msg"></div>
   
   
    <script>
        const PASSWORD = '(120,60)';

        const pw = document.getElementById('pw');
        const btn = document.getElementById('go');
        const msg = document.getElementById('msg');

        function check() {
            if (pw.value === PASSWORD) {
                window.location.href = '7thpuzzle.html';
            } else {
                msg.textContent = 'WRONG';
                pw.value = '';
                pw.focus();
            }
        }

        btn.addEventListener('click', check);
        pw.addEventListener('keydown', e => {
            if (e.key === 'Enter') check();
        });
    </script>
</body>
</html>
